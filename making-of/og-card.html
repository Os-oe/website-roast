<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@600;800;900&family=Inter:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box;font-family:"Inter",sans-serif}
  body{width:1200px;height:630px;overflow:hidden;
    background:radial-gradient(900px 600px at 80% -10%,rgba(255,122,24,.28),transparent 60%),
      radial-gradient(700px 500px at 5% 10%,rgba(226,59,8,.18),transparent 55%),#0c0a09;
    color:#f7ece3;display:flex;align-items:center;padding:80px;gap:60px}
  .left{flex:1}
  .kick{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.2em;font-size:22px;color:#ff7a18;margin-bottom:24px}
  h1{font-family:"Archivo Black",sans-serif;font-size:92px;line-height:.95;letter-spacing:-.01em}
  .fire{background:linear-gradient(180deg,#ffb020,#ff7a18,#e23b08);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{font-size:30px;color:#b9a99c;margin-top:28px;max-width:620px;line-height:1.4}
  .by{position:absolute;bottom:54px;left:80px;display:flex;align-items:center;gap:12px;font-size:22px;color:#7a6c61}
  .by strong{color:#f7ece3}
  .by img{width:34px;height:34px;border-radius:8px}
  .flame{font-size:280px;filter:drop-shadow(0 0 60px rgba(255,122,24,.6))}
  .ring{width:300px;height:300px;border-radius:50%;border:14px solid #ff7a18;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 80px rgba(255,122,24,.5),inset 0 0 60px rgba(255,122,24,.2)}
  .ring span{font-family:"Archivo Black";font-size:120px}
</style></head>
<body>
  <div class="left">
    <div class="kick">🔥 Roast My Website</div>
    <h1>Lass deine<br>Website <span class="fire">rösten.</span></h1>
    <p>Score. Drei brutal-witzige Sprüche. Ein echter Tipp. Live von einem fiesen KI-Röstmeister.</p>
  </div>
  <div class="ring"><span class="fire">?</span></div>
  <div class="by">geröstet von Roast&nbsp;My&nbsp;Website · powered by <img src="../assets/img/osai-logo.png" alt=""> <strong>OsAI</strong></div>
</body></html>
